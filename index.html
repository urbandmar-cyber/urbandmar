<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urban Mar</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
text-align:center;
}

/* LOGO */

.logo{
width:120px;
margin-top:20px;
}

/* BIENVENIDA */

.bienvenida{
display:flex;
align-items:center;
justify-content:center;
gap:20px;
padding:30px;
flex-wrap:wrap;
}

.bienvenida img{
width:220px;
border-radius:10px;
}

.texto-bienvenida{
max-width:400px;
text-align:left;
}

.boton-instagram,.boton-maps{
display:inline-block;
margin-top:10px;
padding:10px 18px;
color:white;
text-decoration:none;
border-radius:8px;
}

.boton-instagram{background:black;}
.boton-maps{background:#1a2948;}

/* CATALOGO */

.catalogo{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;
max-width:1000px;
margin:auto;
}

.producto{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
position:relative;
}

.producto img{
width:100%;
border-radius:10px;
}

.precio{font-weight:bold;}

.etiqueta{
position:absolute;
top:10px;
left:10px;
background:black;
color:white;
padding:4px 8px;
font-size:12px;
border-radius:5px;
}

.agotado{background:red;}

select{
padding:6px;
margin-top:8px;
}

.agregar{
background:#1a2948;
color:white;
border:none;
padding:8px 12px;
border-radius:6px;
margin-top:10px;
cursor:pointer;
}

.agregar:disabled{
background:gray;
}

/* CARRITO ICONO */

.carrito-icono{
position:fixed;
bottom:20px;
right:20px;
background:#1a2948;
color:white;
font-size:22px;
padding:15px;
border-radius:50%;
cursor:pointer;
}

.contador{
position:absolute;
top:-5px;
right:-5px;
background:red;
color:white;
font-size:12px;
padding:3px 6px;
border-radius:50%;
}

/* PANEL CARRITO */

.panel-carrito{
position:fixed;
right:-350px;
top:0;
width:320px;
height:100%;
background:white;
box-shadow:-3px 0 10px rgba(0,0,0,0.2);
padding:20px;
transition:0.3s;
overflow:auto;
text-align:left;
}

.panel-carrito.activo{
right:0;
}

.item{
border-bottom:1px solid #ddd;
padding:10px 0;
}

.eliminar{
color:red;
cursor:pointer;
font-size:14px;
}

.boton{
display:block;
width:100%;
margin-top:10px;
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
}

.vaciar{
background:#999;
color:white;
}

.pedir{
background:#25D366;
color:white;
}

.cerrar{
float:right;
cursor:pointer;
font-size:20px;
}

</style>
</head>

<body>

<img src="logo.jpeg" class="logo">

<section class="bienvenida">

<img src="banner-urbano.jpeg">

<div class="texto-bienvenida">

<h2>Urban Mar</h2>

<p>
Ropa de estilo urbano 🖤<br>
Pedidos por encargo 📦<br>
Preguntar por stock disponible 👕<br><br>

📍 Entregas en Plaza de Armas de Temuco
</p>

<a class="boton-maps" href="https://maps.app.goo.gl/WaMR74y2jeuVYF2UA" target="_blank">
Ver punto de entrega
</a>

<br>

<a class="boton-instagram" href="https://instagram.com/urbandmar" target="_blank">
Ver Instagram
</a>

</div>

</section>

<h2>Catálogo</h2>

<section class="catalogo">

<div class="producto">
<span class="etiqueta agotado">Agotado</span>
<img src="poleron-nike.jpeg">
<h3>Polerón Nike</h3>
<p class="precio">$19.990</p>
<button class="agregar" disabled>Agotado</button>
</div>

<div class="producto">
<img src="buzo-nike-baggy.jpeg">
<h3>Buzo Nike corte recto</h3>
<p class="precio">$19.990</p>

<select id="talla1">
<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>
</select>

<br>

<button class="agregar" onclick="agregar('Buzo Nike corte recto',19990,'talla1')">
Agregar al carrito
</button>

</div>

<div class="producto">
<span class="etiqueta">Nuevo</span>
<img src="IMG_4175.jpeg">
<h3>Polera Kappa roja</h3>
<p class="precio">$6.990</p>

<select id="talla2">
<option>M</option>
</select>

<br>

<button class="agregar" onclick="agregar('Polera Kappa roja',6990,'talla2')">
Agregar al carrito
</button>

</div>

</section>

<!-- ICONO CARRITO -->

<div class="carrito-icono" onclick="abrirCarrito()">
🛒
<span class="contador" id="contador">0</span>
</div>

<!-- PANEL CARRITO -->

<div class="panel-carrito" id="panel">

<span class="cerrar" onclick="cerrarCarrito()">✖</span>

<h3>Carrito</h3>

<div id="lista"></div>

<p id="total"></p>

<button class="boton vaciar" onclick="vaciar()">Vaciar carrito</button>

<button class="boton pedir" onclick="pedir()">Pedir por WhatsApp</button>

</div>

<script>

let carrito=[];

function agregar(nombre,precio,idTalla){

let talla=document.getElementById(idTalla).value;

carrito.push({nombre,precio,talla});

actualizar();

}

function actualizar(){

let lista=document.getElementById("lista");

lista.innerHTML="";

let total=0;

carrito.forEach((p,i)=>{

lista.innerHTML+=`
<div class="item">
${p.nombre}<br>
Talla: ${p.talla}<br>
Precio: $${p.precio}<br>
<span class="eliminar" onclick="eliminar(${i})">Eliminar</span>
</div>
`;

total+=p.precio;

});

document.getElementById("total").innerText="Total: $"+total;

document.getElementById("contador").innerText=carrito.length;

}

function eliminar(i){

carrito.splice(i,1);

actualizar();

}

function vaciar(){

carrito=[];

actualizar();

}

function abrirCarrito(){

document.getElementById("panel").classList.add("activo");

}

function cerrarCarrito(){

document.getElementById("panel").classList.remove("activo");

}

function pedir(){

if(carrito.length==0){

alert("Tu carrito está vacío");

return;

}

let mensaje="Hola, quiero hacer un pedido en Urban Mar.%0A%0A";

let total=0;

carrito.forEach((p,i)=>{

mensaje+=`${i+1}. ${p.nombre}%0ATalla: ${p.talla}%0APrecio: $${p.precio}%0A%0A`;

total+=p.precio;

});

mensaje+=`Total estimado: $${total}`;

window.open("https://wa.me/56940368665?text="+mensaje);

}

</script>

</body>
</html>
